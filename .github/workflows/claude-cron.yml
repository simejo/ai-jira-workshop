name: Daily Exception Fix PR (Azure Log Analytics)
on:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}
jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          base_branch: "main"
          settings: |
            {
              "env": {
                "AZURE_CREDENTIALS": "${{ secrets.AZURE_CREDENTIALS }}",
                "AZURE_LOG_ANALYTICS_WORKSPACE_ID": "${{ secrets.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}"
              }
            }
          prompt: |
            Goal: create a PR that fixes the root causes of the most frequent Azure Log Analytics exceptions from the last 24 hours.

            Log Analytics details:
            - Workspace ID (Customer ID): a53c2ee0-9900-4756-b9c1-ab1b96a28d87
            - Workspace name: law-snkm-p
            - Resource group: rg-snkm-shared-p

            Required query (KQL):
            exceptions
            | where timestamp > ago(24h)
            | summarize count=count() by type, outerMessage
            | top 20 by count desc

            Steps you must perform:
            - Authenticate to Azure using client secret credentials from $AZURE_CREDENTIALS (JSON with clientId/clientSecret/tenantId/subscriptionId).
            - Ensure the Azure CLI `log-analytics` extension is installed (preview allowed) and query the workspace above (or $AZURE_LOG_ANALYTICS_WORKSPACE_ID if set).
            - Summarize the top 3 exceptions and then fix the root causes in this repo.
            - Create a branch and open a PR with the fixes and a clear description.

            Instructions:
            - Identify which exceptions likely correspond to this repo's code. Fix them in the codebase.
            - Prefer small, safe fixes (input validation, null checks, error handling, schema alignment).
            - If the exceptions are clearly not caused by this repo, create a PR that improves observability instead (better logging, error boundaries, clearer messages) and explain why.
            - Ensure the PR description includes: which exceptions were addressed, what changed, and how to verify.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "Bash(az config set*),Bash(az extension add*),Bash(az login*),Bash(az account set*),Bash(az monitor log-analytics query*),Bash(jq*),Bash(npm ci),Bash(npm test),Bash(npm run build),Bash(npm run lint)"
